<style>
/* =============================================================
   RoboBrain — coming-soon scene.
   Brain at center. Left: ground station relaying to a UAV/UGV
   swarm. Right: humanoid sorting. Bottom: autonomous car
   changing lanes around obstacles.
   ============================================================= */
:root{
  --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
  --bg: #070b10;
  --line-strong: rgba(148,180,205,.24);
  --text: #dbe7f0;
  --text-dim: #8ca3b5;
  --text-faint: #5d7386;
  --accent: #38d4e6;
  --accent-soft: rgba(56,212,230,.09);
  --glow: rgba(56,212,230,.35);
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--bg);
  color: var(--text);
  min-height: 100svh;
  display:flex; flex-direction:column;
  overflow-x:hidden;
  -webkit-font-smoothing: antialiased;
}
.brand{
  position:fixed; top:22px; left:26px; z-index:5;
  text-decoration:none;
  display:flex; align-items:center; gap:10px;
  font-family: var(--font-mono); font-size:.8rem; letter-spacing:.2em;
  text-transform:uppercase; color: var(--text-dim);
}
.brand svg{ width:30px; height:30px; }

.coming{
  text-align:center;
  padding: 36px 20px 0;
  font-family: var(--font-mono);
  font-size: .8rem;
  letter-spacing: .42em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.coming .blink{ color: var(--accent); animation: blink 1.1s steps(2) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
@media (max-width: 700px){ .coming{ padding-top: 72px; } }

.scene{
  flex:1;
  display:flex; align-items:center; justify-content:center;
  padding: 8px 12px 24px;
}
.scene svg{ width:min(1200px, 97vw); height:auto; display:block; }

/* --- scene element styles --- */
.bn-o{ stroke: var(--accent); fill:none; stroke-width:1.6; opacity:.5; stroke-linecap:round; }
.bn-fold{ stroke: var(--accent); fill:none; stroke-width:1.1; opacity:.22; stroke-linecap:round; }
.bn-e line{ stroke: var(--accent); stroke-width:1; opacity:.22; }
.bn-n circle{ fill: var(--accent); opacity:.85; }
.bn-f{ fill: var(--accent); }
.brain-glow{ fill: var(--accent); opacity:.05; }

.flow{ stroke: var(--accent); fill:none; stroke-width:1.2; opacity:.14; }
.flowdash{ stroke: var(--accent); fill:none; stroke-width:1.6; stroke-dasharray:3 12; opacity:.38; stroke-linecap:round; }
.link{ stroke: var(--accent); stroke-width:1; opacity:.16; }
.pulse-core{ fill: var(--accent); }
.pulse-halo{ fill: var(--accent); opacity:.22; }
.pulse-sm{ fill: var(--accent); opacity:.8; }

.bot{ color: var(--text-dim); }
.bot *{ stroke: currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
.ground{ stroke: var(--line-strong); stroke-dasharray:4 8; }
.belt-rail{ stroke: var(--line-strong); stroke-width:3; }
.belt-dash{ stroke: var(--text-faint); stroke-width:2; stroke-dasharray:12 9; opacity:.7; }
.box{ fill: var(--accent-soft); stroke: var(--accent); stroke-width:1.2; }
.road{ stroke: var(--line-strong); stroke-width:2; }
.lane{ stroke: var(--text-faint); stroke-width:3; stroke-dasharray:20 16; opacity:.55; }
.arc{ stroke: var(--accent); fill:none; stroke-width:1.6; }
.cone{ stroke: var(--text-dim); stroke-width:1.4; fill: var(--accent-soft); stroke-linejoin:round; }
</style>
</head>
